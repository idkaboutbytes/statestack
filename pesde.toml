name = "idkaboutbytes/statestack"
version = "1.1.2"
description = "StateStack package for Roblox."
license = "MIT"
authors = ["idkaboutbytes"]
repository = "https://github.com/idkaboutbytes/statestack"
includes = ["pesde.toml", "README.md", "CHANGELOG.md", "default.project.json", "src/**/*.luau"]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[dependencies]
Observable = { repo = "idkaboutbytes/observable", rev = "v1.0.2" }
Maid = { repo = "idkaboutbytes/maid", rev = "v1.1.2" }
Loader = { repo = "idkaboutbytes/loader", rev = "v1.2.3" }
BaseObject = { repo = "idkaboutbytes/baseobject", rev = "v1.0.2" }
Brio = { repo = "idkaboutbytes/brio", rev = "v1.2.2" }
Rx = { repo = "idkaboutbytes/rx", rev = "v1.0.5" }
ValueObject = { repo = "idkaboutbytes/valueobject", rev = "v1.0.6" }
